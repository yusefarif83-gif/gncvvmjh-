<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع تجريبي</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0;
            padding: 0;
            background-color: #ff0000; /* خلفية حمراء */
            overflow: hidden; /* لمنع ظهور أشرطة التمرير بسبب المربعات */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* النص الأساسي */
        h1 {
            color: white;
            z-index: 2; /* لضمان بقاء النص فوق المربعات */
            text-align: center;
            font-size: 2rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* حاوية المربعات */
        .squares-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* تصميم المربع الواحد */
        .square {
            position: absolute;
            list-style: none;
            display: block;
            background: rgba(255, 255, 255, 0.2); /* مربعات شفافة قليلاً */
            bottom: -150px;
            animation: animate 25s linear infinite;
        }

        /* أحجام ومواقع مختلفة للمربعات */
        .square:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .square:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .square:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .square:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .square:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .square:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }

        /* حركة المربعات للأعلى */
        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%; /* تتحول لدائرة تدريجياً أثناء الصعود */
            }
        }
    </style>
</head>
<body>

    <h1>تجريبي تقدر تجرب اي شي بسيرفر ذا و الموقع بعد</h1>

    <ul class="squares-container">
        <li class="square"></li>
        <li class="square"></li>
        <li class="square"></li>
        <li class="square"></li>
        <li class="square"></li>
        <li class="square"></li>
    </ul>

</body>
</html>
